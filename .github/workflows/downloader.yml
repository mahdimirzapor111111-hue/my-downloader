name: AVASAM - Deep Asset Website Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl

      - name: Deep Website Downloader (AVASAM)
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFENAME=$(echo "$URL" | sed 's~https\?://~~; s~/~_~g; s/[^A-Za-z0-9._-]/_/g')
            TARGET_DIR="sites/${SAFENAME}"

            echo "🌐 Processing $URL"
            mkdir -p "$TARGET_DIR"

            echo "🕸 Deep mirror with assets..."
            wget \
              --recursive \
              --level=5 \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --span-hosts \
              --domains=$(echo "$URL" | awk -F/ '{print $3}') \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --accept="html,htm,css,js,jpg,jpeg,png,gif,webp,svg,mp4,webm,ogg,mp3,woff,woff2,ttf,otf,json" \
              --timeout=20 \
              --tries=3 \
              -e robots=off \
              -P "$TARGET_DIR" \
              "$URL" || echo "⚠️ Mirror failed, falling back to HTML-only"

            echo "📄 Saving HTML fallback"
            curl -L --fail \
              -H "User-Agent: Mozilla/5.0" \
              "$URL" -o "${TARGET_DIR}/fallback.html" || echo "❌ Could not download HTML"

            echo "🧩 Building offline index.html"
            INDEX="${TARGET_DIR}/index.html"

            # پیدا کردن بهترین صفحه برای نمایش
            MAIN_PAGE=$(find "$TARGET_DIR" -type f \( -name "index.html" -o -name "*.html" \) | head -n 1)

            echo "<html><head><meta charset='UTF-8'><title>Offline Site Viewer</title></head><body>" > "$INDEX"
            echo "<h1>Offline Viewer for $URL</h1>" >> "$INDEX"

            if [ -n "$MAIN_PAGE" ]; then
              REL=$(realpath --relative-to="$TARGET_DIR" "$MAIN_PAGE")
              echo "<p><a href='$REL'>Open main page</a></p>" >> "$INDEX"
            else
              echo "<p>No main page found. Showing fallback.</p>" >> "$INDEX"
              echo "<p><a href='fallback.html'>Open fallback</a></p>" >> "$INDEX"
            fi

            echo "<h2>All pages</h2><ul>" >> "$INDEX"
            find "$TARGET_DIR" -type f -name "*.html" | while read FILE; do
              REL=$(realpath --relative-to="$TARGET_DIR" "$FILE")
              echo "<li><a href='$REL'>$REL</a></li>" >> "$INDEX"
            done
            echo "</ul></body></html>" >> "$INDEX"

          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/
          git commit -m "[AVASAM] Deep website download + offline viewer" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
