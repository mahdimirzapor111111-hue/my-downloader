name: AVASAM-SITE-ULTRA-DOCKER

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  ultra:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-focal
      options: --ipc=host

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js inside container
        run: |
          apt-get update
          apt-get install -y nodejs npm zip

      - name: Create ULTRA script
        run: |
          cat << 'EOF' > ultra.js
          const fs = require('fs');
          const path = require('path');
          const { chromium } = require('playwright');

          async function autoScroll(page) {
            await page.evaluate(async () => {
              await new Promise(resolve => {
                let totalHeight = 0;
                const distance = 500;
                const timer = setInterval(() => {
                  const scrollHeight = document.body.scrollHeight;
                  window.scrollBy(0, distance);
                  totalHeight += distance;

                  if (totalHeight >= scrollHeight - window.innerHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 300);
              });
            });
          }

          async function downloadSite(url, outDir) {
            console.log("🌐 ULTRA capture:", url);

            if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

            const browser = await chromium.launch({
              headless: true
            });

            const page = await browser.newPage();
            const assets = new Set();
            const apis = new Map();

            page.on('response', async (response) => {
              try {
                const req = response.request();
                const resourceUrl = req.url();

                if (!resourceUrl.startsWith("http")) return;

                const ct = response.headers()['content-type'] || "";

                if (ct.includes("application/json")) {
                  apis.set(resourceUrl, await response.text());
                }

                const ext = path.extname(resourceUrl).split("?")[0];
                const allowed = ['.png','.jpg','.jpeg','.gif','.webp','.svg','.css','.js','.mp4','.webm','.woff','.woff2','.ttf','.otf','.json'];

                if (allowed.includes(ext)) {
                  assets.add(resourceUrl);
                }
              } catch {}
            });

            await page.goto(url, { waitUntil: 'networkidle' });

            await autoScroll(page);

            const html = await page.content();
            fs.writeFileSync(path.join(outDir, "index.html"), html);

            console.log("📦 Assets:", assets.size);
            console.log("📡 API responses:", apis.size);

            for (const [apiUrl, body] of apis.entries()) {
              const clean = apiUrl.replace(/https?:\/\//, '').replace(/[^\w.-]/g, '_');
              fs.writeFileSync(path.join(outDir, clean + ".json"), body);
            }

            for (const assetUrl of assets) {
              try {
                const res = await page.request.get(assetUrl);
                const buffer = await res.body();

                const clean = assetUrl.replace(/https?:\/\//, '').replace(/[^\w.-]/g, '_');
                const filePath = path.join(outDir, clean);

                fs.writeFileSync(filePath, buffer);
              } catch (e) {
                console.log("⚠️ Failed asset:", assetUrl);
              }
            }

            await browser.close();
            console.log("✅ ULTRA capture complete:", url);
          }

          const urls = process.argv.slice(2);
          for (const url of urls) {
            const safe = url.replace(/https?:\/\//, '').replace(/[^\w.-]/g, '_');
            downloadSite(url, `sites/${safe}`);
          }
          EOF

      - name: Run ULTRA engine
        run: |
          node ultra.js ${{ github.event.inputs.urls }}

      - name: Zip results
        run: |
          cd sites
          for d in */ ; do
            zip -r "${d%/}.zip" "$d"
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sites/
          git commit -m "[AVASAM-SITE-ULTRA-DOCKER] Full website snapshot" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
