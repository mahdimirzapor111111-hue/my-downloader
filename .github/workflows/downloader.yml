name: AVASAM - Download Website HTML

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'آدرس سایت (مثال: https://youtube.com)'
        required: true
        type: string

jobs:
  save-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download websites
        run: |
          URLS="${{ github.event.inputs.urls }}"
          
          # پوشه برای ذخیره سایت‌ها
          mkdir -p saved-sites
          
          for URL in $URLS; do
            # ساخت نام فایل از آدرس سایت
            FILENAME=$(echo "$URL" | sed 's|https\?://||' | sed 's|/|_|g')
            
            echo "🌐 Downloading: $URL"
            
            # دانلود HTML صفحه با تمام منابع لازم
            wget \
              --mirror \
              --page-requisites \
              --html-extension \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --directory-prefix="saved-sites" \
              --output-document="saved-sites/${FILENAME}.html" \
              "$URL"
              
            echo "✅ Saved: saved-sites/${FILENAME}.html"
          done
          
          # ساخت صفحه اصلی برای دسترسی آسان
          cat > saved-sites/index.html << 'HTMLLIST'
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AVASAM - سایت‌های ذخیره شده</title>
    <style>
        body {
            font-family: Tahoma, Arial;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f0f0;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        a {
            color: #0066cc;
            text-decoration: none;
            font-size: 18px;
        }
        a:hover {
            text-decoration: underline;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>📁 سایت‌های ذخیره شده توسط AVASAM</h1>
    <p>🌐 https://avasam.ir</p>
    <hr>
HTMLLIST

          # لیست همه فایل‌های HTML به جز index.html
          for file in saved-sites/*.html; do
            if [ "$file" != "saved-sites/index.html" ]; then
              filename=$(basename "$file")
              echo "<div class='card'><a href='$filename' target='_blank'>📄 $filename</a></div>" >> saved-sites/index.html
            fi
          done
          
          echo "</body></html>" >> saved-sites/index.html

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add saved-sites/
          git commit -m "[AVASAM] Save websites - $(date +%Y%m%d_%H%M%S)" || echo "Nothing to commit"
          git push
