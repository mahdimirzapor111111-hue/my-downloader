name: AVASAM - Deep Asset Website Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string
      cookie_consent:
        description: 'Cookie consent button selector (CSS/XPath)'
        required: false
        type: string
        default: 'button[aria-label="Accept all"], button:contains("Accept"), button:contains("I agree"), button:contains("Yes, I am"), button:contains("Enter")'
      year_input:
        description: 'Birth year input selector (CSS)'
        required: false
        type: string
        default: 'input[name="year"], input[name="birth_year"], input[type="text"][maxlength="4"]'
      birth_year:
        description: 'Birth year to enter for age verification'
        required: false
        type: string
        default: '1990'
      use_puppeteer:
        description: 'Use headless browser for JavaScript-heavy sites (slower but handles consent dialogs)'
        required: false
        type: boolean
        default: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl

      - name: Install Node.js and Puppeteer (for JS-heavy sites)
        if: ${{ github.event.inputs.use_puppeteer == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Puppeteer
        if: ${{ github.event.inputs.use_puppeteer == 'true' }}
        run: |
          npm init -y
          npm install puppeteer
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            xdg-utils

      - name: Consent Handler & Deep Website Downloader (AVASAM)
        run: |
          URLS="${{ github.event.inputs.urls }}"
          COOKIE_SELECTOR="${{ github.event.inputs.cookie_consent }}"
          YEAR_SELECTOR="${{ github.event.inputs.year_input }}"
          BIRTH_YEAR="${{ github.event.inputs.birth_year }}"
          USE_PUPPETEER="${{ github.event.inputs.use_puppeteer }}"
          
          mkdir -p sites

          for URL in $URLS; do
            SAFENAME=$(echo "$URL" | sed 's~https\?://~~; s~/~~g; s/[^A-Za-z0-9.-]//g')
            TARGETDIR="sites/${SAFENAME}"
            HTMLFILE="${TARGETDIR}.html"
            COOKIEFILE="cookies_${SAFENAME}.txt"

            echo "🌐 Processing $URL"

            # Step 1: Extract domain for cookie/consent handling
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            echo "📌 Domain: $DOMAIN"

            # Step 2: Handle consent dialogs with Puppeteer if enabled
            if [ "$USE_PUPPETEER" = "true" ]; then
              echo "🤖 Using headless browser to handle consent dialogs..."
              
              cat > consent_handler.js << 'PUPPETEER_SCRIPT'
              const puppeteer = require('puppeteer');
              
              (async () => {
                const url = process.env.TARGET_URL;
                const cookieSelector = process.env.COOKIE_SELECTOR;
                const yearSelector = process.env.YEAR_SELECTOR;
                const birthYear = process.env.BIRTH_YEAR;
                const cookieFile = process.env.COOKIE_FILE;
                
                console.log(`🚀 Launching browser for ${url}`);
                
                const browser = await puppeteer.launch({
                  headless: 'new',
                  args: [
                    '--no-sandbox',
                    '--disable-setuid-sandbox',
                    '--disable-dev-shm-usage',
                    '--disable-web-security',
                    '--disable-features=IsolateOrigins,site-per-process'
                  ]
                });
                
                const page = await browser.newPage();
                
                // Set realistic viewport and user agent
                await page.setViewport({ width: 1920, height: 1080 });
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36');
                
                try {
                  // Navigate to the page
                  await page.goto(url, { 
                    waitUntil: 'networkidle2',
                    timeout: 30000 
                  });
                  
                  console.log('📄 Page loaded, looking for consent dialogs...');
                  
                  // Short wait for dynamic content
                  await page.waitForTimeout(2000);
                  
                  // Handle age verification
                  const yearField = await page.$(yearSelector);
                  if (yearField) {
                    console.log('🎂 Found age verification field');
                    await yearField.click({ clickCount: 3 });
                    await yearField.type(birthYear);
                    await page.waitForTimeout(500);
                    
                    // Look for submit button after entering year
                    const submitButtons = [
                      'button[type="submit"]',
                      'input[type="submit"]',
                      'button:has-text("Enter")',
                      'button:has-text("Continue")',
                      'button:has-text("Submit")',
                      'button:has-text("Next")',
                      'a:has-text("Enter")'
                    ];
                    
                    for (const btnSelector of submitButtons) {
                      try {
                        const submitBtn = await page.$(btnSelector);
                        if (submitBtn) {
                          console.log(`👆 Clicking submit: ${btnSelector}`);
                          await submitBtn.click();
                          await page.waitForTimeout(2000);
                          break;
                        }
                      } catch (e) {}
                    }
                  }
                  
                  // Handle cookie consent
                  const consentSelectors = cookieSelector.split(', ');
                  for (const selector of consentSelectors) {
                    try {
                      const consentBtn = await page.$(selector);
                      if (consentBtn) {
                        console.log(`🍪 Accepting cookies: ${selector}`);
                        await consentBtn.click();
                        await page.waitForTimeout(1000);
                        break;
                      }
                    } catch (e) {}
                  }
                  
                  // Common X/Twitter specific consent handling
                  try {
                    // Twitter age gate
                    const twitterAgeBtn = await page.$('[data-testid="age-gate-yes-button"]');
                    if (twitterAgeBtn) {
                      console.log('🐦 Twitter age gate detected');
                      await twitterAgeBtn.click();
                      await page.waitForTimeout(2000);
                    }
                  } catch (e) {}
                  
                  // Wait for page to stabilize after consent
                  await page.waitForTimeout(3000);
                  
                  // Save cookies for wget
                  const cookies = await page.cookies();
                  let cookieStr = '# Netscape HTTP Cookie File\n';
                  cookies.forEach(cookie => {
                    cookieStr += `${cookie.domain}\tTRUE\t${cookie.path}\tFALSE\t${cookie.expires || 0}\t${cookie.name}\t${cookie.value}\n`;
                  });
                  
                  require('fs').writeFileSync(cookieFile, cookieStr);
                  console.log('💾 Cookies saved');
                  
                  // Take screenshot for debugging
                  await page.screenshot({ path: `sites/debug_${process.env.SAFE_NAME}.png`, fullPage: true });
                  console.log('📸 Screenshot saved');
                  
                } catch (error) {
                  console.error('❌ Consent handling error:', error.message);
                } finally {
                  await browser.close();
                }
              })();
              PUPPETEER_SCRIPT

              # Run Puppeteer script
              TARGET_URL="$URL" \
              COOKIE_SELECTOR="$COOKIE_SELECTOR" \
              YEAR_SELECTOR="$YEAR_SELECTOR" \
              BIRTH_YEAR="$BIRTH_YEAR" \
              COOKIE_FILE="$COOKIEFILE" \
              SAFE_NAME="$SAFENAME" \
              node consent_handler.js || echo "⚠️ Consent handling failed, continuing anyway"
            fi

            # Step 3: Download with wget (using cookies if available)
            echo "🕸 Deep mirror with assets..."
            
            WGET_COOKIE_OPTS=""
            if [ -f "$COOKIEFILE" ]; then
              WGET_COOKIE_OPTS="--load-cookies=$COOKIEFILE --keep-session-cookies --save-cookies=${COOKIEFILE}"
              echo "🍪 Using cookies for authenticated/consented session"
            fi

            wget \
              --recursive \
              --level=5 \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --span-hosts \
              --domains="$DOMAIN" \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
              --header="Accept-Language: en-US,en;q=0.5" \
              --header="Accept-Encoding: gzip, deflate, br" \
              --header="DNT: 1" \
              --header="Connection: keep-alive" \
              --header="Upgrade-Insecure-Requests: 1" \
              --header="Sec-Fetch-Dest: document" \
              --header="Sec-Fetch-Mode: navigate" \
              --header="Sec-Fetch-Site: none" \
              --header="Sec-Fetch-User: ?1" \
              --header="Cache-Control: max-age=0" \
              --accept="html,htm,css,js,jpg,jpeg,png,gif,webp,svg,mp4,webm,ogg,mp3,woff,woff2,ttf,otf,json,xml,pdf,ico" \
              --timeout=30 \
              --tries=3 \
              --wait=1 \
              --random-wait \
              -e robots=off \
              $WGET_COOKIE_OPTS \
              -P "$TARGETDIR" \
              "$URL" || {
                echo "⚠️ Mirror failed, trying HTML-only fallback..."
                
                # Fallback: Use curl with cookies
                CURL_COOKIE_OPTS=""
                if [ -f "$COOKIEFILE" ]; then
                  CURL_COOKIE_OPTS="--cookie $(cat $COOKIEFILE | grep -v '^#' | awk '{print $6"="$7}' | tr '\n' ';')"
                fi
                
                curl -L --fail \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Accept: text/html,application/xhtml+xml" \
                  $CURL_COOKIE_OPTS \
                  "$URL" -o "$HTMLFILE" || echo "❌ Could not download HTML"
              }

            # Clean up cookie file
            rm -f "$COOKIEFILE"
            
            echo "✅ Finished processing $URL"
          done

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consent-debug-screenshots
          path: sites/debug_*.png
          retention-days: 7

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Remove debug screenshots before commit
          rm -f sites/debug_*.png
          
          git add sites/
          git commit -m "[AVASAM] Deep website download with consent handling" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
