name: Full Android Project Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v3

    # 1) اگر پروژه Gradle ندارد → خودش می‌سازد
    - name: Generate Gradle project structure if missing
      run: |
        if [ ! -f "settings.gradle" ]; then
          echo "include ':app'" > settings.gradle
        fi

        if [ ! -f "build.gradle" ]; then
          cat <<EOF > build.gradle
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF
        fi

        mkdir -p app

        if [ ! -f "app/build.gradle" ]; then
          cat <<EOF > app/build.gradle
plugins {
    id 'com.android.application'
}

android {
    namespace "com.example.application"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.application"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {}
EOF
