name: Full Android Auto Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 1) دانلود Gradle Wrapper واقعی
    - name: Download Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
        unzip gradle.zip -d gradle_temp
        cp -r gradle_temp/*/lib/gradle-launcher-*.jar gradle/wrapper/
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

        cat <<EOF > gradlew
#!/bin/sh
DIR="\$(cd "\$(dirname "\$0")" && pwd)"
java -jar "\$DIR/gradle/wrapper/gradle-launcher-*.jar" "\$@"
EOF
        chmod +x gradlew

    # 2) ساخت ساختار پروژه اندروید
    - name: Generate Android Project
      run: |
        mkdir -p app/src/main/java/com/example/application
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        echo "include ':app'" > settings.gradle

        cat <<EOF > build.gradle
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
EOF

        cat <<EOF > app/build.gradle
plugins { id 'com.android.application' }
android {
    namespace "com.example.application"
    compileSdk 34
    defaultConfig {
        applicationId "com.example.application"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}
EOF

        cat <<EOF > app/src/main/AndroidManifest.xml
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.example.application">

    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>

    <application android:label="HUD App">
        <activity android:name=".MainActivity">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
        <service android:name=".FloatingService" android:exported="false"/>
    </application>

</manifest>
EOF

        echo "<LinearLayout></LinearLayout>" > app/src/main/res/layout/floating_input.xml
        echo "<LinearLayout></LinearLayout>" > app/src/main/res/layout/floating_output.xml

        cat <<EOF > app/src/main/java/com/example/application/MainActivity.java
package com.example.application;
import android.app.Activity;
import android.os.Bundle;
public class MainActivity extends Activity {
    @Override protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
    }
}
EOF

        cat <<EOF > app/src/main/java/com/example/application/FloatingService.java
package com.example.application;
import android.app.Service;
import android.content.Intent;
import android.os.IBinder;
public class FloatingService extends Service {
    @Override public IBinder onBind(Intent i){ return null; }
}
EOF

    # 3) نصب SDK
    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    # 4) Build APK
    - name: Build APK
      run: ./gradlew assembleDebug

    # 5) ذخیره APK
    - name: Save APK
      run: |
        mkdir -p built-apk
        cp app/build/outputs/apk/debug/*.apk built-apk/

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: HUDApp-APK
        path: built-apk/*.apk
