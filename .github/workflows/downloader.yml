name: AVASAM - Deep Asset Website Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          npm init -y
          npm install playwright@latest

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Deep Website Downloader (AVASAM + Playwright HTML render)
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites scripts

          cat > scripts/renderandsave.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { chromium } = require('playwright');

          (async () => {
            const url = process.argv[2];
            const outFile = process.argv[3];

            if (!url || !outFile) {
              console.error('Usage: node renderandsave.js <url> <output-file>');
              process.exit(1);
            }

            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
            });

            // محدود کردن timeout کلی
            page.setDefaultTimeout(20000);
            page.setDefaultNavigationTimeout(20000);

            try {
              console.log('🌐 Opening:', url);
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 40000 });

              // کمی صبر برای لود اولیه
              await page.waitForTimeout(3000);

              const overlaySelectors = [
                'button:has-text("OK")',
                'button:has-text("Ok")',
                'button:has-text("Ok!")',
                'button:has-text("Accept")',
                'button:has-text("I Accept")',
                'button:has-text("Agree")',
                'button:has-text("I Agree")',
                'button:has-text("Continue")',
                'button:has-text("Enter")',
                '[role="button"]:has-text("OK")',
                '[role="button"]:has-text("Accept")',
                '[role="button"]:has-text("Continue")',
                '[role="button"]:has-text("Enter")'
              ];

              // حداکثر 3 تلاش برای بستن overlay
              for (let attempt = 0; attempt < 3; attempt++) {
                let clicked = false;

                for (const sel of overlaySelectors) {
                  try {
                    const btn = await page.$(sel);
                    if (btn) {
                      console.log(`🕹 [Attempt ${attempt + 1}] Clicking overlay-like button:`, sel);
                      await btn.click({ delay: 50 });
                      clicked = true;
                      await page.waitForTimeout(1500);
                      break;
                    }
                  } catch (e) {
                    // نادیده بگیر
                  }
                }

                if (!clicked) {
                  console.log('ℹ️ No overlay-like button found in this attempt, stopping overlay handling.');
                  break;
                }
              }

              // کمی صبر بعد از آخرین تلاش
              await page.waitForTimeout(2000);

              const content = await page.content();
              const dir = path.dirname(outFile);
              fs.mkdirSync(dir, { recursive: true });
              fs.writeFileSync(outFile, content, 'utf-8');
              console.log('✅ Saved rendered HTML to', outFile);
            } catch (err) {
              console.error('❌ Playwright render failed:', err);
              process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF

          for URL in $URLS; do
            # ساخت نام امن برای پوشه (باگ sed اینجا بود)
            SAFENAME=$(echo "$URL" | sed 's~https\?://~~; s~/~_~g; s/[^A-Za-z0-9._-]//g')
            TARGETDIR="sites/${SAFENAME}"
            HTMLFILE="${TARGETDIR}/index.rendered.html"

            echo "🌐 Processing $URL"
            mkdir -p "$TARGETDIR"

            echo "🕸 Deep mirror with assets (wget)..."
            wget \
              --recursive \
              --level=3 \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --span-hosts \
              --domains=$(echo "$URL" | awk -F/ '{print $3}') \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --accept="html,htm,css,js,jpg,jpeg,png,gif,webp,svg,mp4,webm,ogg,mp3,woff,woff2,ttf,otf,json" \
              --timeout=20 \
              --tries=2 \
              -e robots=off \
              -P "$TARGETDIR" \
              "$URL" || echo "⚠️ Mirror failed (wget), will still try Playwright HTML render"

            echo "📄 Saving rendered HTML with Playwright"
            node scripts/renderandsave.js "$URL" "$HTMLFILE" || echo "❌ Playwright render failed for $URL"
          done

      - name: Commit & Push
        env:
          GITHUBREFNAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/ || true
          git commit -m "[AVASAM] Deep website download" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUBREFNAME}"
          git push origin HEAD:"${GITHUBREFNAME}"
