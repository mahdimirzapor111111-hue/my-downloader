name: AVASAM - Deep Asset Website Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install monolith
        run: |
          # دانلود نسخه از پیش کامپایل شده monolith
          curl -L https://github.com/Y2Z/monolith/releases/download/v2.8.3/monolith-gnu-linux-x86_64 -o monolith
          chmod +x monolith
          sudo mv monolith /usr/local/bin/

      - name: Convert each URL to self-contained HTML
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFENAME=$(echo "$URL" | sed 's~https\?://~~; s~/~-~g; s/[^A-Za-z0-9._-]//g')
            OUTPUTFILE="sites/${SAFENAME}.html"

            echo "🌐 Processing $URL -> $OUTPUTFILE"

            # monolith تمام دارایی‌ها را درون فایل HTML قرار می‌دهد
            monolith "$URL" \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --timeout=30 \
              --no-frames \
              -o "$OUTPUTFILE" \
              || echo "⚠️ monolith failed for $URL, falling back to simple curl"

            # اگر monolith شکست خورد، HTML ساده را ذخیره کن
            if [ ! -s "$OUTPUTFILE" ]; then
              echo "📄 Fallback HTML-only download"
              curl -L --fail \
                -H "User-Agent: Mozilla/5.0" \
                "$URL" -o "$OUTPUTFILE" || echo "❌ Could not download HTML"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/
          git commit -m "[AVASAM] Self-contained website HTML(s) saved" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
