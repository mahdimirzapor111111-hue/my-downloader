name: Download and Save to Downloads Folder

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک دانلود (فقط یک لینک)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup tools and folders
        run: |
          sudo apt update && sudo apt install -y aria2
          mkdir -p downloads

      - name: Download files
        run: |
          echo "Downloading: ${{ github.event.inputs.urls }}"
          aria2c --dir=downloads --split=2 "${{ github.event.inputs.urls }}"

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          git diff --staged --quiet || (git commit -m "Add file to downloads" && git push origin main)
