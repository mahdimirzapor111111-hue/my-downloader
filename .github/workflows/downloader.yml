name: AVASAM-SITE-PRO-MAX

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  promax:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 18 (Playwright compatible)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright + Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libcairo2 \
            libatspi2.0-0 \
            libx11-xcb1 \
            libxshmfence1

          npm install -g playwright
          playwright install chromium

      - name: Create PRO-MAX script
        run: |
          cat << 'EOF' > promax.js
          const fs = require('fs');
          const path = require('path');
          const { chromium } = require('playwright');

          async function downloadSite(url, outDir) {
            console.log("🌐 Starting PRO-MAX capture:", url);

            if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

            const browser = await chromium.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();
            const assets = new Set();

            page.on('response', async (response) => {
              try {
                const req = response.request();
                const resourceUrl = req.url();

                if (!resourceUrl.startsWith("http")) return;

                const ext = path.extname(resourceUrl).split("?")[0];
                const allowed = ['.png','.jpg','.jpeg','.gif','.webp','.svg','.css','.js','.mp4','.webm','.woff','.woff2','.ttf','.otf'];

                if (allowed.includes(ext)) {
                  assets.add(resourceUrl);
                }
              } catch {}
            });

            await page.goto(url, { waitUntil: 'networkidle' });

            const html = await page.content();
            fs.writeFileSync(path.join(outDir, "index.html"), html);

            console.log("📦 Downloading assets:", assets.size);

            for (const assetUrl of assets) {
              try {
                const res = await page.request.get(assetUrl);
                const buffer = await res.body();

                const clean = assetUrl.replace(/https?:\/\//, '').replace(/[^\w.-]/g, '_');
                const filePath = path.join(outDir, clean);

                fs.writeFileSync(filePath, buffer);
              } catch (e) {
                console.log("⚠️ Failed asset:", assetUrl);
              }
            }

            await browser.close();
            console.log("✅ PRO-MAX capture complete:", url);
          }

          const urls = process.argv.slice(2);
          for (const url of urls) {
            const safe = url.replace(/https?:\/\//, '').replace(/[^\w.-]/g, '_');
            downloadSite(url, `sites/${safe}`);
          }
          EOF

      - name: Run PRO-MAX engine
        run: |
          node promax.js ${{ github.event.inputs.urls }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sites/
          git commit -m "[AVASAM-SITE-PRO-MAX] Full website snapshot" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
