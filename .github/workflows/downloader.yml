name: AVASAM - Safe Website Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl

      - name: Download websites safely
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFE_NAME=$(echo "$URL" | sed 's~https\?://~~; s~/~_~g; s/[^A-Za-z0-9._-]/_/g')
            TARGET_DIR="sites/${SAFE_NAME}"
            HTML_FILE="${TARGET_DIR}.html"

            echo "🌐 Processing $URL"

            mkdir -p "$TARGET_DIR"

            echo "🕸 Trying full mirror..."
            wget \
              --mirror \
              --convert-links \
              --adjust-extension \
              --page-requisites \
              --no-parent \
              -P "$TARGET_DIR" \
              "$URL" || echo "⚠️ Mirror failed, falling back to HTML-only"

            echo "📄 Saving HTML fallback"
            curl -L --fail "$URL" -o "$HTML_FILE" || echo "❌ Could not download HTML"
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/
          git commit -m "[AVASAM] Website download" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
