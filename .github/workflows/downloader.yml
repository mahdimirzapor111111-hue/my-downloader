name: AVASAM - Mirror Websites

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs to mirror'
        required: true
        type: string

jobs:
  mirror-sites:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wget
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

      - name: AVASAM Website Mirror - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Website Mirror"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Mirror websites
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFE_NAME=$(echo "$URL" | sed 's~https\?://~~; s~/~_~g; s/[^A-Za-z0-9._-]/_/g')
            TARGET_DIR="sites/${SAFE_NAME}"

            echo "🕸 Mirroring $URL -> $TARGET_DIR"

            wget \
              --mirror \
              --convert-links \
              --adjust-extension \
              --page-requisites \
              --no-parent \
              -P "$TARGET_DIR" \
              "$URL"
          done

      - name: Commit & Push mirrored sites (AVASAM)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🏷️  AVASAM (https://avasam.ir) - Preparing to commit mirrored sites"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard sites/)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          git add "${ALL_FILES[@]}"
          git commit -m "[AVASAM] Add mirrored websites [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"

          echo "🎉 All $TOTAL mirrored files pushed — AVASAM (https://avasam.ir)"
