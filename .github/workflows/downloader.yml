name: AVASAM - Deep Asset Website Downloader + ZIP + Viewer

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl zip

      - name: Deep Website Downloader (AVASAM)
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFE_NAME=$(echo "$URL" | sed 's~https\?://~~; s~/~_~g; s/[^A-Za-z0-9._-]/_/g')
            TARGET_DIR="sites/${SAFE_NAME}"
            VIEWER_HTML="${TARGET_DIR}_viewer.html"

            echo "🌐 Processing $URL"
            mkdir -p "$TARGET_DIR"

            echo "🕸 Deep mirror with assets..."
            wget \
              --recursive \
              --level=5 \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --span-hosts \
              --domains=$(echo "$URL" | awk -F/ '{print $3}') \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --accept="html,htm,css,js,jpg,jpeg,png,gif,webp,svg,mp4,webm,ogg,mp3,woff,woff2,ttf,otf,json" \
              --timeout=20 \
              --tries=3 \
              -e robots=off \
              -P "$TARGET_DIR" \
              "$URL" || echo "⚠️ Mirror failed, fallback HTML only"

            echo "📄 Creating fallback HTML"
            curl -L --fail \
              -H "User-Agent: Mozilla/5.0" \
              "$URL" -o "${TARGET_DIR}.html" || echo "❌ Could not download fallback HTML"

            echo "🧩 Building HTML viewer"
            echo "<html><head><meta charset='UTF-8'><title>AVASAM Viewer - ${SAFE_NAME}</title></head><body>" > "$VIEWER_HTML"
            echo "<h1>AVASAM Viewer – ${SAFE_NAME}</h1>" >> "$VIEWER_HTML"
            echo "<p>All downloaded images, videos, CSS, JS, and files:</p>" >> "$VIEWER_HTML"

            echo "<h2>Images</h2>" >> "$VIEWER_HTML"
            find "$TARGET_DIR" -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.svg" \) | while read FILE; do
              REL=$(echo "$FILE" | sed "s|$TARGET_DIR/||")
              echo "<div><img src='$REL' style='max-width:300px; margin:10px;'></div>" >> "$VIEWER_HTML"
            done

            echo "<h2>Videos</h2>" >> "$VIEWER_HTML"
            find "$TARGET_DIR" -type f \( -iname "*.mp4" -o -iname "*.webm" -o -iname "*.ogg" \) | while read FILE; do
              REL=$(echo "$FILE" | sed "s|$TARGET_DIR/||")
              echo "<video controls width='400'><source src='$REL'></video><br>" >> "$VIEWER_HTML"
            done

            echo "<h2>Other Files</h2>" >> "$VIEWER_HTML"
            find "$TARGET_DIR" -type f ! -iname "*.html" ! -iname "*.htm" | while read FILE; do
              REL=$(echo "$FILE" | sed "s|$TARGET_DIR/||")
              echo "<a href='$REL' download>$REL</a><br>" >> "$VIEWER_HTML"
            done

            echo "</body></html>" >> "$VIEWER_HTML"

            echo "📦 Creating ZIP archive"
            zip -r "sites/${SAFE_NAME}.zip" "$TARGET_DIR" "${TARGET_DIR}.html" "$VIEWER_HTML"
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/
          git commit -m "[AVASAM] Deep website download + ZIP + Viewer" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
