- name: Download websites safely (assets-focused)
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFE_NAME=$(echo "$URL" | sed 's~https\?://~~; s~/~_~g; s/[^A-Za-z0-9._-]/_/g')
            TARGET_DIR="sites/${SAFE_NAME}"
            HTML_FILE="${TARGET_DIR}.html"

            echo "🌐 Processing $URL"
            mkdir -p "$TARGET_DIR"

            echo "🕸 Deep mirror with assets..."
            wget \
              --recursive \
              --level=3 \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --span-hosts \
              --domains=$(echo "$URL" | awk -F/ '{print $3}') \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --accept="html,htm,css,js,jpg,jpeg,png,gif,webp,svg,mp4,webm,ogg,mp3,woff,woff2,ttf,otf" \
              --timeout=20 \
              --tries=3 \
              -P "$TARGET_DIR" \
              "$URL" || echo "⚠️ Mirror failed, falling back to HTML-only"

            echo "📄 Saving HTML fallback"
            curl -L --fail \
              -H "User-Agent: Mozilla/5.0" \
              "$URL" -o "$HTML_FILE" || echo "❌ Could not download HTML"
          done
