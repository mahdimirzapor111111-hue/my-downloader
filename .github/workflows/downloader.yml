name: AVASAM - Deep Asset Website Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of website URLs'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl

      - name: Deep Website Downloader (AVASAM)
        run: |
          URLS="${{ github.event.inputs.urls }}"
          mkdir -p sites

          for URL in $URLS; do
            SAFENAME=$(echo "$URL" | sed 's~https\?://; s~/g; s/[^A-Za-z0-9.-]//g')
            TARGETDIR="sites/${SAFENAME}"
            HTMLFILE="${TARGETDIR}.html"

            echo "🌐 Processing $URL"
            mkdir -p "$TARGET_DIR"

            echo "🕸 Deep mirror with assets..."
            wget \
              --recursive \
              --level=5 \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --span-hosts \
              --domains=$(echo "$URL" | awk -F/ '{print $3}') \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              --accept="html,htm,css,js,jpg,jpeg,png,gif,webp,svg,mp4,webm,ogg,mp3,woff,woff2,ttf,otf,json" \
              --timeout=20 \
              --tries=3 \
              -e robots=off \
              -P "$TARGET_DIR" \
              "$URL" || echo "⚠️ Mirror failed, falling back to HTML-only"

            echo "📄 Saving HTML fallback"
            curl -L --fail \
              -H "User-Agent: Mozilla/5.0" \
              "$URL" -o "$HTML_FILE" || echo "❌ Could not download HTML"
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/
          git commit -m "[AVASAM] Deep website download" || echo "Nothing to commit"
          git pull --rebase origin "${GITHUBREFNAME}"
          git push origin HEAD:"${GITHUBREFNAME}"
